<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomellida - AI Chat</title>
  <link rel="icon" href="flag.webp" type="image/webp">
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; max-width: 800px; margin: auto; padding: 20px; }
    #chat-log { height: 400px; border: 1px solid #444; overflow-y: auto; padding: 15px; background: #000; border-radius: 5px; margin-bottom: 10px; }
    .msg { margin-bottom: 15px; line-height: 1.5; }
    .user { color: #00bfff; font-weight: bold; }
    .ai { color: #32cd32; font-weight: bold; }
    #status { font-size: 12px; color: #888; margin-bottom: 5px; }
    #input-group { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
    button { padding: 10px 20px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 5px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Bomellida AI</h1>
  <div id="status">Loading AI engine (first time only)...</div>
  <div id="chat-log"></div>
  
  <div id="input-group">
    <input type="text" id="user-input" placeholder="Type a message..." disabled>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script type="module">
    // Load library from CDN
    import { pipeline } from 'https://cdn.jsdelivr.net';

    const log = document.getElementById('chat-log');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    // THIS IS THE MEMORY: A simple list of the whole conversation
    let chatHistory = [];

    // Load the tiny text generator model
    const generator = await pipeline('text-generation', 'Xenova/SmolLM2-135M-Instruct');
    
    status.innerText = "AI Online. Running locally on your device.";
    input.disabled = false;
    btn.disabled = false;

    async function handleChat() {
      const text = input.value.trim();
      if (!text) return;

      // 1. Add user message to display and memory
      appendMessage('You', text, 'user');
      chatHistory.push({ role: "user", content: text });
      input.value = "";
      status.innerText = "Thinking...";

      // 2. Generate response using the WHOLE history (so it remembers)
      const output = await generator(chatHistory, { 
        max_new_tokens: 100, 
        temperature: 0.7, 
        do_sample: true 
      });

      // 3. Get the AI's actual text and save it to memory
      const aiText = output[0].generated_text.at(-1).content;
      appendMessage('AI', aiText, 'ai');
      chatHistory.push({ role: "assistant", content: aiText });
      
      status.innerText = "AI Online.";
      log.scrollTop = log.scrollHeight;
    }

    function appendMessage(sender, text, className) {
      log.innerHTML += `<div class="msg"><span class="${className}">${sender}:</span> ${text}</div>`;
    }

    btn.onclick = handleChat;
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
  </script>
</body>
</html>
