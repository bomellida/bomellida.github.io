<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bomellida AI - Secure</title>
  <link rel="icon" href="flag.webp" type="image/webp">
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; max-width: 600px; margin: auto; padding: 20px; }
    #chat-box { height: 300px; border: 1px solid #444; background: #000; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    #status { font-size: 10px; color: #666; }
    input { width: 80%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; }
  </style>
</head>
<body>
  <div id="status">Status: Waiting for file upload...</div>
  <div id="chat-box"></div>
  <input type="text" id="user-input" placeholder="Type here...">
  
  <!-- Use your LOCAL repo file, not the CDN -->
  <script type="module">
    import { pipeline, env } from '/transformers.js';

    // Disable internet lookups to prevent ERR_FAILED
    env.allowLocalModels = false;
    env.useBrowserCache = true;

    let chatHistory = [];
    const status = document.getElementById('status');
    const box = document.getElementById('chat-box');

    try {
      // Initialize with a tiny model
      const generator = await pipeline('text-generation', 'onnx-community/SmolLM2-135M-Instruct');
      status.innerText = "Status: AI Live (Local)";

      document.getElementById('user-input').onkeypress = async (e) => {
        if (e.key === 'Enter') {
          const val = e.target.value;
          chatHistory.push({ role: "user", content: val });
          box.innerHTML += `<p><b>You:</b> ${val}</p>`;
          e.target.value = "";

          const output = await generator(chatHistory, { max_new_tokens: 50 });
          const reply = output.generated_text.at(-1).content;
          
          chatHistory.push({ role: "assistant", content: reply });
          box.innerHTML += `<p style="color:green"><b>AI:</b> ${reply}</p>`;
          box.scrollTop = box.scrollHeight;
        }
      };
    }
  </script>
</body>
</html>
