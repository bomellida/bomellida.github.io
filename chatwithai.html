<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomellida - AI Chat</title>
  <link rel="icon" href="flag.webp" type="image/webp">
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; max-width: 800px; margin: auto; padding: 20px; }
    #chat-log { height: 400px; border: 1px solid #444; overflow-y: auto; padding: 15px; background: #000; border-radius: 5px; margin-bottom: 10px; display: flex; flex-direction: column; }
    .msg { margin-bottom: 15px; line-height: 1.5; padding: 8px; border-radius: 4px; }
    .user { background: #003366; align-self: flex-end; color: #00bfff; }
    .ai { background: #1a331a; align-self: flex-start; color: #32cd32; }
    #status { font-size: 12px; color: #888; margin-bottom: 5px; }
    #input-group { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
    button { padding: 10px 20px; cursor: pointer; background: #444; color: #fff; border: none; border-radius: 5px; }
    button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <h1>Bomellida AI</h1>
  <div id="status">Initializing Engine...</div>
  <div id="chat-log"></div>
  <div id="input-group">
    <input type="text" id="user-input" placeholder="Type a message..." disabled>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script type="module">
    // Direct import from HuggingFace's official ESM build
    import { pipeline, env } from 'https://cdn.jsdelivr.net';

    // FIX: This stops the ERR_FAILED by telling the AI not to look for local files on GitHub
    env.allowLocalModels = false;
    env.useBrowserCache = true;

    const log = document.getElementById('chat-log');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const status = document.getElementById('status');

    let chatHistory = []; // MEMORY

    try {
      // Smallest functional chat model (SmolLM2-135M)
      const generator = await pipeline('text-generation', 'onnx-community/SmolLM2-135M-Instruct');
      
      status.innerText = "AI Online. No API. Local Only.";
      input.disabled = false;
      btn.disabled = false;

      async function handleChat() {
        const text = input.value.trim();
        if (!text) return;

        appendMessage('You', text, 'user');
        chatHistory.push({ role: "user", content: text });
        input.value = "";
        status.innerText = "Thinking...";

        const output = await generator(chatHistory, { 
          max_new_tokens: 100,
          temperature: 0.7,
          do_sample: true 
        });

        const aiText = output[0].generated_text.at(-1).content;
        appendMessage('AI', aiText, 'ai');
        chatHistory.push({ role: "assistant", content: aiText });
        
        status.innerText = "AI Online.";
        log.scrollTop = log.scrollHeight;
      }

      btn.onclick = handleChat;
      input.onkeypress = (e) => { if (e.key === 'Enter') handleChat(); };

    } catch (err) {
      status.innerText = "Error loading AI: Check console.";
      console.error(err);
    }

    function appendMessage(sender, text, className) {
      const div = document.createElement('div');
      div.className = `msg ${className}`;
      div.innerHTML = `<b>${sender}:</b> ${text}`;
      log.appendChild(div);
    }
  </script>
</body>
</html>
