<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real Local AI</title>
  <!-- Use the BUNDLE script to avoid "import" errors -->
  <script src="https://cdn.jsdelivr.net"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; }
    #chat { height: 300px; border: 1px solid #444; overflow-y: auto; background: #000; padding: 10px; margin-bottom: 10px; }
    #status { font-size: 12px; color: #888; }
    input { width: 80%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; }
  </style>
</head>
<body>
  <h3>Neural Network Chat</h3>
  <div id="status">Loading AI engine...</div>
  <div id="chat"></div>
  <input type="text" id="user-input" placeholder="Say anything..." disabled>

  <script>
    // Access the library from the global "transformers" object
    const { pipeline, env } = transformers;

    // FORCE the AI to ignore local files and use the cloud model
    env.allowLocalModels = false;
    env.useBrowserCache = true;

    let chatHistory = [];
    let generator;

    async function init() {
      try {
        // Load the tiny 135M neural network (NOT hardcoded)
        generator = await pipeline('text-generation', 'onnx-community/SmolLM2-135M-Instruct');
        
        document.getElementById('status').innerText = "AI ONLINE (Neural Net Active)";
        document.getElementById('user-input').disabled = false;
      } catch (err) {
        document.getElementById('status').innerText = "Error: Check Console";
        console.error(err);
      }
    }

    document.getElementById('user-input').onkeypress = async (e) => {
      if (e.key === 'Enter') {
        const val = e.target.value;
        e.target.value = "";
        
        // Add to UI and Memory
        document.getElementById('chat').innerHTML += `<p><b>You:</b> ${val}</p>`;
        chatHistory.push({ role: "user", content: val });

        document.getElementById('status').innerText = "Thinking...";

        // GENERATION: The model calculates the answer (No if/else logic here)
        const output = await generator(chatHistory, { max_new_tokens: 60 });
        const aiText = output[0].generated_text.at(-1).content;

        // Save AI response to Memory
        chatHistory.push({ role: "assistant", content: aiText });
        
        document.getElementById('chat').innerHTML += `<p style="color:green"><b>AI:</b> ${aiText}</p>`;
        document.getElementById('status').innerText = "AI ONLINE";
      }
    };

    init();
  </script>
</body>
</html>
