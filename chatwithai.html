<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomellida - Dynamic AI</title>
  <link rel="icon" href="flag.webp" type="image/webp">
  <style>
    body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
    #chat-log { height: 400px; border: 1px solid #0f0; overflow-y: auto; padding: 10px; background: #111; margin-bottom: 10px; }
    #status { font-size: 12px; color: #888; margin-bottom: 10px; }
    #input-group { display: flex; gap: 10px; }
    input { flex: 1; background: #222; border: 1px solid #0f0; color: #0f0; padding: 10px; }
    button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #555; }
  </style>
</head>
<body>
  <h1>BOMELLIDA DYNAMIC INTELLIGENCE</h1>
  <div id="status">Loading AI Brain... (Progress: 0%)</div>
  <div id="chat-log"></div>
  <div id="input-group">
    <input type="text" id="user-input" placeholder="Type a real question..." disabled>
    <button id="send-btn" disabled>SEND</button>
  </div>

  <script type="module">
    // 1. Load WebLLM from an official CDN
    import * as webllm from "https://esm.run";

    const status = document.getElementById('status');
    const log = document.getElementById('chat-log');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');

    // MEMORY: This stores the actual conversation history
    let chatHistory = [{ role: "system", content: "You are a helpful assistant for the Bomellida archives." }];

    // 2. Select a tiny model (Llama-3.2-1B is under GitHub's 1GB limit)
    const modelId = "Llama-3.2-1B-Instruct-q4f16_1-MLC";

    const engine = await webllm.CreateMLCEngine(modelId, {
      initProgressCallback: (report) => {
        status.innerText = `Loading Brain: ${Math.round(report.progress * 100)}%`;
      }
    });

    status.innerText = "AI ONLINE (No Hardcoded Responses)";
    input.disabled = false;
    btn.disabled = false;

    window.handleChat = async () => {
      const text = input.value.trim();
      if (!text) return;

      appendMsg("You", text);
      chatHistory.push({ role: "user", content: text });
      input.value = "";
      status.innerText = "Thinking...";

      // 3. GENERATE: The AI actually thinks of an answer here
      const reply = await engine.chat.completions.create({ messages: chatHistory });
      const aiResponse = reply.choices[0].message.content;

      appendMsg("AI", aiResponse);
      chatHistory.push({ role: "assistant", content: aiResponse });
      status.innerText = "AI ONLINE";
    };

    function appendMsg(who, txt) {
      log.innerHTML += `<p><b>${who}:</b> ${txt}</p>`;
      log.scrollTop = log.scrollHeight;
    }

    btn.onclick = window.handleChat;
    input.onkeypress = (e) => { if (e.key === 'Enter') window.handleChat(); };
  </script>
</body>
</html>
